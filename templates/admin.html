<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }} Admin</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero minimal">
        <div class="hero-copy">
          <p class="eyebrow">Admin Dashboard</p>
          <h1>Hospital and usage management</h1>
        </div>
        <div class="hero-actions hero-actions-stack">
          <a class="ghost-link secondary-btn" href="/">Back to Landing</a>
          <button id="admin-logout-btn" type="button">Logout</button>
        </div>
      </section>

      <section class="grid two">
        <article class="panel">
          <h2>Usage Stats</h2>
          <div id="stats-grid" class="stats-grid"></div>
        </article>

        <article class="panel">
          <h2>Add or Update Hospital</h2>
          <form id="admin-hospital-form" class="stack-form">
            <input name="hospital_id" type="number" placeholder="Hospital ID for update" />
            <input name="name" placeholder="Hospital name" required />
            <input name="city" placeholder="City" required />
            <input name="specialization" placeholder="Specialization" required />
            <input name="rating" type="number" min="0" max="5" step="0.1" placeholder="Rating" />
            <div class="inline">
              <input name="latitude" type="number" step="0.000001" placeholder="Latitude" />
              <input name="longitude" type="number" step="0.000001" placeholder="Longitude" />
            </div>
            <label class="checkbox">
              <input name="emergency_services" type="checkbox" />
              Emergency services available
            </label>
            <div class="inline">
              <button type="submit">Save Hospital</button>
              <button id="delete-hospital" class="secondary-btn" type="button">Delete By ID</button>
            </div>
          </form>
          <div id="admin-status" class="muted"></div>
        </article>
      </section>

      <section class="panel">
        <h2>Hospital Catalog</h2>
        <div id="admin-hospitals" class="cards"></div>
      </section>
    </main>

    <script src="/static/js/admin.js"></script>
  </body>
</html>
