<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">AI Healthcare Assistant</p>
          <h1>Find the right hospital faster.</h1>
          <p class="lede">
            Enter symptoms or a disease, choose severity, add location, and get ranked hospital recommendations with emergency-aware prioritization.
          </p>
        </div>
        <div class="hero-actions hero-actions-stack">
          <a class="ghost-link secondary-btn" href="/">Back to Landing</a>
          <button id="logout-btn" type="button">Logout</button>
        </div>
      </section>

      <section class="dashboard-lead">
        <article class="panel feature-panel">
          <h2>Recommendation Request</h2>
          <form id="recommend-form" class="stack-form">
            <textarea name="symptoms" rows="4" placeholder="Symptoms, e.g. fever and headache"></textarea>
            <div class="inline">
              <select name="severity" required>
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
              <input name="city" placeholder="City" />
            </div>
            <select name="language">
              <option value="en">English</option>
              <option value="hi">Hindi</option>
            </select>
            <button type="submit">Get Recommendations</button>
          </form>
        </article>

        <aside class="panel recommendation-panel">
          <div class="panel-header">
            <h2>Recommended Hospitals</h2>
            <div class="panel-actions">
              <button id="open-booking-modal" class="secondary-btn" type="button">Book Appointment</button>
              <button id="open-history-modal" class="secondary-btn" type="button">History</button>
            </div>
          </div>
          <div id="summary" class="summary"></div>
          <div id="recommendation-cards" class="cards recommendation-cards"></div>
        </aside>
      </section>

      <div id="booking-modal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-close-modal="booking-modal"></div>
        <article class="panel modal-panel" role="dialog" aria-modal="true" aria-labelledby="booking-modal-title">
          <div class="panel-header">
            <h2 id="booking-modal-title">Appointment Booking</h2>
            <button class="secondary-btn modal-close" type="button" data-close-modal="booking-modal">Close</button>
          </div>
          <form id="booking-form" class="stack-form">
            <input name="hospital_id" type="number" placeholder="Hospital ID from recommendations" required />
            <input name="disease" placeholder="Disease" required />
            <input name="department" placeholder="Department" required />
            <select name="severity" required>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
            <div class="inline">
              <input name="appointment_date" type="date" required />
              <input name="appointment_time" type="time" required />
            </div>
            <button type="submit">Book Appointment</button>
          </form>
          <div id="booking-status" class="muted"></div>
        </article>
      </div>

      <div id="history-modal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-close-modal="history-modal"></div>
        <article class="panel modal-panel history-panel" role="dialog" aria-modal="true" aria-labelledby="history-modal-title">
          <div class="panel-header">
            <h2 id="history-modal-title">History</h2>
            <div class="panel-actions">
              <button id="load-history" class="secondary-btn" type="button">Load History</button>
              <button class="secondary-btn modal-close" type="button" data-close-modal="history-modal">Close</button>
            </div>
          </div>
          <div id="history-cards" class="cards subdued history-cards"></div>
        </article>
      </div>
    </main>

    <script type="module" src="/static/js/app.js"></script>
  </body>
</html>
